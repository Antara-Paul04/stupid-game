<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Digger - Jetpack Joyride</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===== AUDIO =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCrystalSound() {
  const now = audioCtx.currentTime;
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(1200, now);
  osc1.frequency.exponentialRampToValueAtTime(1800, now + 0.1);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(1500, now);
  osc2.frequency.exponentialRampToValueAtTime(2400, now + 0.15);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
  osc1.start(now); osc2.start(now); osc1.stop(now + 0.3); osc2.stop(now + 0.3);
}

function playDeathSound() {
  const now = audioCtx.currentTime;
  // Crunch
  const bufSize = audioCtx.sampleRate * 0.3;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.15));
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 400;
  const g1 = audioCtx.createGain();
  g1.gain.setValueAtTime(0.2, now);
  g1.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  noise.connect(filt); filt.connect(g1); g1.connect(audioCtx.destination);
  noise.start(now); noise.stop(now + 0.4);
  // Low thud
  const osc = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, now);
  osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
  g2.gain.setValueAtTime(0.2, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  osc.connect(g2); g2.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.4);
}

function playRumbleSound() {
  const now = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.15;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 200;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.06, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  noise.start(now); noise.stop(now + 0.15);
}

// ===== DAY/NIGHT =====
let nightMode = false;

// ===== GAME STATE =====
let game = {
  state: 'menu',
  score: 0,
  highScore: parseInt(localStorage.getItem('jetpackHigh') || '0'),
  speed: 3.6,
  frame: 0,
  crystalsCollected: 0,
  level: 1,
};

// Player
const player = {
  x: 120,
  y: 250,
  w: 32,
  h: 44,
  vx: 0,
  vy: 0,
  thrust: false,
  particles: [],
  scale: 1.0,
};

// Collections
let obstacles = [];
let coins = [];
let bgParticles = [];
let screenShake = 0;
let collectEffects = [];
let deathPieces = []; // body parts on death
let deathFlash = 0;
let combo = 0;
let comboTimer = 0;
let maxCombo = 0;
let xp = 0;
let xpLevel = 1;
let xpToNext = 100;
let hudPopups = []; // floating +score popups
let levelUpFlash = 0;
let nearMissTimer = 0;
let nearMissCount = 0;

// Fuel system
let fuel = 100;
const fuelMax = 100;
const fuelDrain = 0.15; // per frame while thrusting
const fuelRegen = 0; // no passive regen; refill only from fuel cans
let fuelCans = [];
let fuelWarning = 0; // flashing when low
let fuelBoost = 0; // brief glow after pickup

// Init bg particles
function initBgParticles() {
  bgParticles = [];
  for (let i = 0; i < 80; i++) {
    bgParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 1 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}
initBgParticles();

// Cave formations
let stalactites = [];
let stalagmites = [];
function initFormations() {
  stalactites = []; stalagmites = [];
  for (let i = 0; i < 25; i++) {
    stalactites.push({ x: Math.random() * canvas.width * 2, w: Math.random() * 20 + 10, h: Math.random() * 50 + 15 });
    stalagmites.push({ x: Math.random() * canvas.width * 2, w: Math.random() * 25 + 10, h: Math.random() * 35 + 10 });
  }
}
initFormations();

// ===== INPUT =====
let inputDown = false;
let mouseTarget = { x: -1, y: -1, active: false }; // mouse/touch target for free movement
let keys = { up: false, down: false, left: false, right: false };

function resumeAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvas.width / rect.width),
    y: (clientY - rect.top) * (canvas.height / rect.height),
  };
}

document.addEventListener('mousedown', (e) => {
  resumeAudio();
  const {x: mx, y: my} = getCanvasCoords(e.clientX, e.clientY);
  if (game.state === 'dead') { handleInput(mx, my); return; }
  const toggleX = canvas.width / 2 - 50;
  if (mx >= toggleX && mx <= toggleX + 100 && my >= 6 && my <= 60) {
    nightMode = !nightMode;
    return;
  }
  inputDown = true;
  mouseTarget = { x: mx, y: my, active: true };
  handleInput(mx, my);
});
document.addEventListener('mousemove', (e) => {
  if (inputDown) {
    const {x: mx, y: my} = getCanvasCoords(e.clientX, e.clientY);
    mouseTarget = { x: mx, y: my, active: true };
  }
});
document.addEventListener('mouseup', () => { inputDown = false; mouseTarget.active = false; });
document.addEventListener('touchstart', (e) => {
  e.preventDefault(); resumeAudio();
  const {x: mx, y: my} = getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY);
  if (game.state === 'dead') { handleInput(mx, my); return; }
  const toggleX = canvas.width / 2 - 50;
  if (mx >= toggleX && mx <= toggleX + 100 && my >= 6 && my <= 60) {
    nightMode = !nightMode;
    return;
  }
  inputDown = true;
  mouseTarget = { x: mx, y: my, active: true };
  handleInput(mx, my);
});
document.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length > 0) {
    const {x: mx, y: my} = getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY);
    mouseTarget = { x: mx, y: my, active: true };
  }
});
document.addEventListener('touchend', (e) => { e.preventDefault(); inputDown = false; mouseTarget.active = false; });
document.addEventListener('keydown', (e) => {
  if (game.state === 'dead' && (e.code === 'Space' || e.code === 'Enter')) { e.preventDefault(); startGame(); return; }
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); resumeAudio(); keys.up = true; inputDown = true; handleInput(-1, -1); }
  if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); keys.down = true; }
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); keys.left = true; }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); keys.right = true; }
  if (e.code === 'KeyN') nightMode = !nightMode;
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { keys.up = false; inputDown = keys.down || keys.left || keys.right; }
  if (e.code === 'ArrowDown' || e.code === 'KeyS') { keys.down = false; }
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') { keys.left = false; }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { keys.right = false; }
});

function handleInput(mx, my) {
  if (game.state === 'menu') startGame();
  else if (game.state === 'dead' && shareCardReady) {
    // Check share button
    if (mx >= shareBtn.x && mx <= shareBtn.x + shareBtn.w && my >= shareBtn.y && my <= shareBtn.y + shareBtn.h) {
      shareCard();
      return;
    }
    // Check retry button
    if (mx >= retryBtn.x && mx <= retryBtn.x + retryBtn.w && my >= retryBtn.y && my <= retryBtn.y + retryBtn.h) {
      startGame();
      return;
    }
  } else if (game.state === 'dead') {
    startGame();
  }
}

function startGame() {
  game.state = 'playing';
  game.score = 0;
  game.speed = 3.6;
  game.frame = 0;
  game.crystalsCollected = 0;
  game.level = 1;
  player.x = 120;
  player.y = canvas.height / 2;
  player.vx = 0;
  player.vy = 0;
  player.particles = [];
  player.scale = 1.0;
  obstacles = [];
  coins = [];
  collectEffects = [];
  deathPieces = [];
  deathFlash = 0;
  screenShake = 0;
  combo = 0;
  comboTimer = 0;
  maxCombo = 0;
  xp = 0;
  xpLevel = 1;
  xpToNext = 100;
  hudPopups = [];
  levelUpFlash = 0;
  nearMissTimer = 0;
  nearMissCount = 0;
  fuel = fuelMax;
  fuelCans = [];
  fuelWarning = 0;
  fuelBoost = 0;
  shareCardReady = false;
  currentBiome = 0;
  lastBiome = 0;
  biomeTransition = 0;
}

function playLevelUpSound() {
  const now = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.1, now + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.2);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.25);
  });
}

function playComboSound(comboNum) {
  const now = audioCtx.currentTime;
  const freq = 800 + Math.min(comboNum, 10) * 100;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, now);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.3, now + 0.05);
  g.gain.setValueAtTime(0.08, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.15);
}

function addXP(amount) {
  xp += amount;
  while (xp >= xpToNext) {
    xp -= xpToNext;
    xpLevel++;
    xpToNext = Math.floor(100 * Math.pow(1.3, xpLevel - 1));
    levelUpFlash = 60;
    playLevelUpSound();
    hudPopups.push({
      text: `RANK ${xpLevel}!`,
      x: canvas.width / 2,
      y: canvas.height / 2 - 40,
      vy: -1.5,
      life: 80,
      maxLife: 80,
      color: '#ff44ff',
      size: 32,
      glow: true,
    });
  }
}

function spawnScorePopup(x, y, text, color) {
  hudPopups.push({
    text, x, y,
    vy: -2,
    life: 40,
    maxLife: 40,
    color: color || '#ffd700',
    size: 16,
    glow: false,
  });
}

function getDifficultyState() {
  const level = Math.min(4, Math.floor(game.score / 1000) + 1);
  const obstacleInterval = [110, 95, 82, 70][level - 1];
  const coinInterval = [78, 72, 68, 64][level - 1];
  const speed = [3.6, 4.2, 4.9, 5.7][level - 1];
  return { level, obstacleInterval, coinInterval, speed };
}

function createForkRock(side) {
  const level = getDifficultyState().level;
  const width = 70 + Math.random() * 35 + level * 6;
  const height = 70 + Math.random() * 40 + level * 10;
  const branchCount = 2 + Math.floor(Math.random() * 2);
  const baseY = side === 'top' ? 14 : canvas.height - 50;
  const direction = side === 'top' ? 1 : -1;
  const prongs = [];

  for (let i = 0; i < branchCount; i++) {
    prongs.push({
      offset: width * (0.2 + i * (0.6 / Math.max(1, branchCount - 1))),
      width: 10 + Math.random() * 10,
      length: height * (0.35 + Math.random() * 0.35),
      lean: (Math.random() - 0.5) * 18,
    });
  }

  return {
    type: 'forkRock',
    side,
    x: canvas.width + 40,
    y: side === 'top' ? baseY : baseY - height,
    w: width,
    h: height,
    direction,
    prongs,
  };
}

// ===== DEATH EXPLOSION =====
function spawnDeathExplosion(px, py, scale) {
  const s = scale;
  const colors = ['#cc8833', '#dda855', '#8B6914', '#654321', '#555', '#888', '#ffd700', '#7a5522', '#8B4513'];
  // Body parts: head, torso, hat, arms, legs, pickaxe, jetpack pieces
  const parts = [
    { label: 'head', cx: 16*s, cy: 4*s, w: 20*s, h: 20*s, color: '#dda855', shape: 'circle' },
    { label: 'hat', cx: 16*s, cy: -10*s, w: 28*s, h: 14*s, color: '#8B6914', shape: 'rect' },
    { label: 'torso', cx: 16*s, cy: 22*s, w: 20*s, h: 22*s, color: '#cc8833', shape: 'rect' },
    { label: 'armL', cx: 5*s, cy: 20*s, w: 6*s, h: 14*s, color: '#dda855', shape: 'rect' },
    { label: 'armR', cx: 27*s, cy: 20*s, w: 6*s, h: 14*s, color: '#dda855', shape: 'rect' },
    { label: 'legL', cx: 10*s, cy: 38*s, w: 7*s, h: 10*s, color: '#8B4513', shape: 'rect' },
    { label: 'legR', cx: 20*s, cy: 38*s, w: 7*s, h: 10*s, color: '#8B4513', shape: 'rect' },
    { label: 'jetpack', cx: 3*s, cy: 20*s, w: 10*s, h: 24*s, color: '#555', shape: 'rect' },
    { label: 'pick', cx: 40*s, cy: 10*s, w: 12*s, h: 12*s, color: '#888', shape: 'rect' },
    { label: 'buckle', cx: 16*s, cy: 30*s, w: 5*s, h: 4*s, color: '#ffd700', shape: 'rect' },
    { label: 'beard', cx: 16*s, cy: 12*s, w: 16*s, h: 10*s, color: '#7a5a10', shape: 'circle' },
  ];

  for (const part of parts) {
    const angle = Math.atan2(part.cy - 20 * s, part.cx - 16 * s);
    const force = 3 + Math.random() * 6;
    deathPieces.push({
      x: px + part.cx,
      y: py + part.cy,
      w: part.w,
      h: part.h,
      vx: Math.cos(angle) * force + (Math.random() - 0.5) * 4,
      vy: Math.sin(angle) * force - Math.random() * 5 - 2,
      rot: 0,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      color: part.color,
      shape: part.shape,
      life: 120 + Math.random() * 60,
      maxLife: 180,
      gravity: 0.15,
    });
  }

  // Extra debris/blood-like dust
  for (let i = 0; i < 25; i++) {
    const a = Math.random() * Math.PI * 2;
    const f = 2 + Math.random() * 7;
    deathPieces.push({
      x: px + 16 * s,
      y: py + 20 * s,
      w: 3 + Math.random() * 5,
      h: 3 + Math.random() * 5,
      vx: Math.cos(a) * f,
      vy: Math.sin(a) * f - 2,
      rot: 0,
      rotSpeed: (Math.random() - 0.5) * 0.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: Math.random() > 0.5 ? 'circle' : 'rect',
      life: 60 + Math.random() * 60,
      maxLife: 120,
      gravity: 0.12 + Math.random() * 0.1,
    });
  }
}

// ===== SPAWN OBSTACLES =====
function spawnObstacle() {
  const difficulty = getDifficultyState();
  const level = difficulty.level;
  const type = Math.random();
  const groundY = canvas.height - 50;
  if (level >= 2 && type < (level >= 4 ? 0.34 : level >= 3 ? 0.28 : 0.22)) {
    obstacles.push(createForkRock(Math.random() > 0.5 ? 'top' : 'bottom'));
  } else if (type < (level === 1 ? 0.62 : 0.42)) {
    const y = Math.random() * (groundY - 150) + 60;
    obstacles.push({
      type: 'boulder',
      x: canvas.width + 20,
      y: y,
      w: 30, h: 30,
      radius: 15 + Math.random() * 12,
      angle: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.06,
      cracks: Array.from({length: 3}, () => ({
        a: Math.random() * Math.PI * 2,
        l: Math.random() * 0.6 + 0.3,
      })),
    });
  } else if (level >= 2 && type < (level >= 4 ? 0.72 : 0.64)) {
    const y = Math.random() * (groundY - 100) + 60;
    obstacles.push({
      type: 'rollingStone',
      x: canvas.width + 250,
      y: y,
      w: 48, h: 48,
      radius: 24,
      speed: game.speed + 2.5 + level * 0.35,
      warning: 60,
      warningY: y,
      angle: 0,
      bumps: Array.from({length: 10}, () => Math.random() * 8 + 20),
    });
  } else {
    const y = Math.random() * (groundY - 150) + 60;
    obstacles.push({
      type: 'boulder',
      x: canvas.width + 20,
      y: y,
      w: 26, h: 26,
      radius: 13 + Math.random() * 10,
      angle: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.05,
      cracks: Array.from({length: 2}, () => ({
        a: Math.random() * Math.PI * 2,
        l: Math.random() * 0.5 + 0.25,
      })),
    });
  }
}

function spawnCoins() {
  const groundY = canvas.height - 50;
  const startY = Math.random() * (groundY - 150) + 60;
  const pattern = Math.floor(Math.random() * 3);
  for (let i = 0; i < 5; i++) {
    let cx = canvas.width + 20 + i * 40;
    let cy = startY;
    if (pattern === 1) cy = startY + Math.sin(i * 0.8) * 50;
    if (pattern === 2) cy = startY - i * 25;
    coins.push({ x: cx, y: cy, r: 12, collected: false });
  }
}

// Fuel can spawning
function spawnFuelCan() {
  const groundY = canvas.height - 50;
  const y = Math.random() * (groundY - 120) + 70;
  fuelCans.push({ x: canvas.width + 20, y: y, w: 20, h: 26, collected: false, bob: Math.random() * Math.PI * 2 });
}

function playFuelSound() {
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'square';
  osc2.type = 'sine';
  osc.frequency.setValueAtTime(220, now);
  osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
  osc2.frequency.setValueAtTime(440, now);
  osc2.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
  g.gain.setValueAtTime(0.08, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(g); osc2.connect(g); g.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.2);
  osc2.start(now); osc2.stop(now + 0.2);
}

// ===== COLLISION =====
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}
function circleRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

// Jetpack particles
function emitJetpackParticle() {
  player.particles.push({
    x: player.x + 5 + Math.random() * 10,
    y: player.y + player.h,
    vx: (Math.random() - 0.5) * 2 - game.speed * 0.3,
    vy: Math.random() * 3 + 1,
    life: 20 + Math.random() * 10,
    maxLife: 30,
    size: Math.random() * 6 + 3,
  });
}

function spawnCollectEffect(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i;
    collectEffects.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 2),
      vy: Math.sin(angle) * (2 + Math.random() * 2),
      life: 20,
      maxLife: 20,
      size: 2 + Math.random() * 3,
    });
  }
}

// ===== UPDATE =====
function update() {
  game.frame++;
  const groundY = canvas.height - 50;

  // Update death pieces always (even when dead)
  for (let i = deathPieces.length - 1; i >= 0; i--) {
    const p = deathPieces[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.rot += p.rotSpeed;
    p.vx *= 0.99;
    // Bounce off ground
    if (p.y > groundY) {
      p.y = groundY;
      p.vy *= -0.4;
      p.vx *= 0.8;
      p.rotSpeed *= 0.7;
    }
    p.life--;
    if (p.life <= 0) deathPieces.splice(i, 1);
  }

  if (deathFlash > 0) deathFlash--;

  if (game.state !== 'playing') return;

  // --- Fuel system ---
  const hasFuel = fuel > 0;
  if (fuelBoost > 0) fuelBoost--;
  if (fuelWarning > 0) fuelWarning--;
  if (fuel <= 20 && game.frame % 30 === 0) fuelWarning = 15;

  // --- Full 2D movement ---
  const moveSpeed = 0.7;
  const friction = 0.88;
  let isThrusting = false;

  // Mouse/touch: move toward target position
  if (mouseTarget.active && inputDown && hasFuel) {
    const dx = mouseTarget.x - (player.x + player.w / 2);
    const dy = mouseTarget.y - (player.y + player.h / 2);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 5) {
      player.vx += (dx / dist) * moveSpeed;
      player.vy += (dy / dist) * moveSpeed;
    }
    isThrusting = true;
  } else {
    // Keyboard movement
    if (keys.up && hasFuel) {
      player.vy -= 0.8;
      isThrusting = true;
    } else {
      player.vy += 0.5; // gravity
    }
    if (keys.down) player.vy += 0.6;
    if (keys.left) player.vx -= moveSpeed;
    if (keys.right) player.vx += moveSpeed;

    // If just tapping/holding (no mouse, no keys), use old behavior
    if (!keys.up && !keys.down && !keys.left && !keys.right && inputDown && hasFuel) {
      player.vy -= 0.8;
      isThrusting = true;
    }
  }

  // Consume or regen fuel
  if (isThrusting) {
    fuel = Math.max(0, fuel - fuelDrain);
    player.thrust = true;
    if (game.frame % 2 === 0) emitJetpackParticle();
  } else {
    fuel = Math.min(fuelMax, fuel + fuelRegen);
    player.thrust = false;
  }

  // Apply friction to horizontal movement
  player.vx *= friction;

  // Clamp velocities
  player.vx = Math.max(-10, Math.min(10, player.vx));
  player.vy = Math.max(-8, Math.min(8, player.vy));

  player.x += player.vx;
  player.y += player.vy;

  const sw = player.w * player.scale;
  const sh = player.h * player.scale;

  // Vertical bounds
  if (player.y < 15) { player.y = 15; player.vy = 0; }
  if (player.y + sh > groundY) {
    player.y = groundY - sh;
    player.vy = 0;
  }
  // Horizontal bounds
  if (player.x < 10) { player.x = 10; player.vx = 0; }
  if (player.x + sw > canvas.width - 10) { player.x = canvas.width - sw - 10; player.vx = 0; }

  game.score += 1;
  const difficulty = getDifficultyState();
  game.level = difficulty.level;
  game.speed = difficulty.speed;

  if (game.frame % difficulty.obstacleInterval === 0) spawnObstacle();
  if (game.frame % difficulty.coinInterval === 0) spawnCoins();
  if (game.frame % 200 === 0) spawnFuelCan(); // fuel cans every ~3.3 sec

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    if (o.type === 'rollingStone') {
      if (o.warning > 0) o.warning--;
      else { o.x -= o.speed; o.angle -= 0.1; }
    } else if (o.type === 'forkRock') {
      o.x -= game.speed;
    } else {
      o.x -= game.speed;
      o.angle += o.rotSpeed;
    }

    if (o.x + (o.w || 0) < -150) { obstacles.splice(i, 1); continue; }

    let hit = false;
    if (o.type === 'boulder') {
      hit = circleRectOverlap(o.x + o.w / 2, o.y + o.h / 2, o.radius, player.x, player.y, sw, sh);
    } else if (o.type === 'rollingStone' && o.warning <= 0) {
      hit = circleRectOverlap(o.x + o.w / 2, o.y, o.radius, player.x, player.y, sw, sh);
    } else if (o.type === 'forkRock') {
      const trunkH = o.h * 0.55;
      const trunkY = o.side === 'top' ? o.y : o.y + o.h - trunkH;
      hit = rectsOverlap(player.x, player.y, sw, sh, o.x + o.w * 0.32, trunkY, o.w * 0.36, trunkH);
      if (!hit) {
        for (const prong of o.prongs) {
          const prongX = o.x + prong.offset - prong.width / 2;
          const prongY = o.side === 'top' ? o.y + trunkH - 6 : o.y + o.h - trunkH - prong.length + 6;
          if (rectsOverlap(player.x, player.y, sw, sh, prongX, prongY, prong.width, prong.length)) {
            hit = true;
            break;
          }
        }
      }
    }

    if (hit) {
      game.state = 'dead';
      screenShake = 30;
      deathFlash = 8;
      playDeathSound();
      spawnDeathExplosion(player.x, player.y, player.scale);
      if (game.score > game.highScore) {
        game.highScore = game.score;
        localStorage.setItem('jetpackHigh', game.highScore.toString());
      }
    }
  }

  // Update coins
  for (let i = coins.length - 1; i >= 0; i--) {
    coins[i].x -= game.speed;
    if (coins[i].x < -30) { coins.splice(i, 1); continue; }
    if (!coins[i].collected) {
      const dx = (player.x + sw / 2) - coins[i].x;
      const dy = (player.y + sh / 2) - coins[i].y;
      if (Math.sqrt(dx * dx + dy * dy) < coins[i].r + 15 * player.scale) {
        coins[i].collected = true;
        // Combo system
        combo++;
        comboTimer = 90; // ~1.5 sec window
        if (combo > maxCombo) maxCombo = combo;
        const comboMult = Math.min(combo, 10);
        const baseScore = 50;
        const totalScore = baseScore * comboMult;
        game.score += totalScore;
        game.crystalsCollected++;
        player.scale += 0.0005;
        addXP(10 + comboMult * 3);
        playCrystalSound();
        if (combo > 1) playComboSound(combo);
        spawnCollectEffect(coins[i].x, coins[i].y);
        // Score popup
        let popText = `+${totalScore}`;
        if (combo > 1) popText += ` x${comboMult}`;
        spawnScorePopup(coins[i].x, coins[i].y - 20, popText, combo > 4 ? '#ff66ff' : combo > 2 ? '#66ffff' : '#ffd700');
        if (combo === 5) {
          spawnScorePopup(coins[i].x, coins[i].y - 45, 'FRENZY!', '#ff44ff');
        } else if (combo === 10) {
          spawnScorePopup(coins[i].x, coins[i].y - 45, 'UNSTOPPABLE!', '#ff2222');
        }
      }
    }
  }

  // Update fuel cans
  for (let i = fuelCans.length - 1; i >= 0; i--) {
    fuelCans[i].x -= game.speed;
    fuelCans[i].bob += 0.06;
    if (fuelCans[i].x < -30) { fuelCans.splice(i, 1); continue; }
    if (!fuelCans[i].collected) {
      const fc = fuelCans[i];
      const bobY = fc.y + Math.sin(fc.bob) * 6;
      if (rectsOverlap(player.x, player.y, sw, sh, fc.x - fc.w/2, bobY - fc.h/2, fc.w, fc.h)) {
        fc.collected = true;
        const refill = 30 + Math.random() * 15;
        fuel = Math.min(fuelMax, fuel + refill);
        fuelBoost = 30;
        playFuelSound();
        addXP(5);
        spawnScorePopup(fc.x, bobY - 20, `+FUEL`, '#44ddff');
        spawnCollectEffect(fc.x, bobY);
      }
    }
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 0;
  }

  // Near-miss detection
  const sw2 = sw, sh2 = sh;
  for (const o of obstacles) {
    let nearDist = Infinity;
    if (o.type === 'boulder') {
      const ddx = (o.x + o.w/2) - (player.x + sw2/2);
      const ddy = (o.y + o.h/2) - (player.y + sh2/2);
      nearDist = Math.sqrt(ddx*ddx + ddy*ddy) - o.radius - Math.max(sw2, sh2)/2;
    } else if (o.type === 'rollingStone' && o.warning <= 0) {
      const ddx = (o.x + o.w/2) - (player.x + sw2/2);
      const ddy = o.y - (player.y + sh2/2);
      nearDist = Math.sqrt(ddx*ddx + ddy*ddy) - o.radius - Math.max(sw2, sh2)/2;
    }
    if (nearDist > 0 && nearDist < 22 && nearMissTimer <= 0) {
      nearMissTimer = 30;
      nearMissCount++;
      addXP(25);
      game.score += 100;
      spawnScorePopup(player.x + sw2 + 10, player.y, 'NEAR MISS! +100', '#44ff44');
    }
  }
  if (nearMissTimer > 0) nearMissTimer--;
  if (levelUpFlash > 0) levelUpFlash--;

  // XP from distance
  if (game.frame % 60 === 0) addXP(5);

  // Update particles
  for (let i = player.particles.length - 1; i >= 0; i--) {
    const p = player.particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) player.particles.splice(i, 1);
  }
  for (let i = collectEffects.length - 1; i >= 0; i--) {
    const e = collectEffects[i];
    e.x += e.vx; e.y += e.vy; e.life--;
    if (e.life <= 0) collectEffects.splice(i, 1);
  }
  // Update HUD popups
  for (let i = hudPopups.length - 1; i >= 0; i--) {
    hudPopups[i].y += hudPopups[i].vy;
    hudPopups[i].life--;
    if (hudPopups[i].life <= 0) hudPopups.splice(i, 1);
  }
  for (const s of bgParticles) {
    s.x -= s.speed; s.twinkle += 0.03;
    if (s.x < 0) { s.x = canvas.width; s.y = Math.random() * canvas.height; }
  }
  if (screenShake > 0) screenShake -= 0.6;
}

function getBiomeIndex() {
  return Math.min(BIOMES.length - 1, Math.floor(game.score / 5000));
}

function getTheme() {
  const biomeIdx = getBiomeIndex();
  // Track biome change for transition
  if (biomeIdx !== lastBiome) {
    biomeTransition = 60;
    lastBiome = biomeIdx;
    hudPopups.push({
      text: BIOMES[biomeIdx].name,
      x: canvas.width / 2,
      y: canvas.height / 2,
      vy: -0.8,
      life: 120,
      maxLife: 120,
      color: BIOMES[biomeIdx].nameColor,
      size: 36,
      glow: true,
    });
    hudPopups.push({
      text: `${biomeIdx * 5}km REACHED`,
      x: canvas.width / 2,
      y: canvas.height / 2 + 40,
      vy: -0.8,
      life: 100,
      maxLife: 100,
      color: '#ffffff',
      size: 16,
      glow: false,
    });
  }
  currentBiome = biomeIdx;
  const biome = BIOMES[biomeIdx];
  return nightMode ? biome.night : biome.day;
}

// ===== DRAW =====
function draw() {
  const t = getTheme();
  const W = canvas.width;
  const H = canvas.height;
  const groundY = H - 50;
  ctx.save();

  // Screen shake
  if (game.state === 'playing' && screenShake > 0.5) {
    const intensity = screenShake;
    ctx.translate(
      (Math.random() - 0.5) * intensity * 3,
      (Math.random() - 0.5) * intensity * 3
    );
  }

  // Death white flash
  if (deathFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${deathFlash / 8 * 0.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  // === CAVE BACKGROUND ===
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, t.bgTop);
  grad.addColorStop(1, t.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Wall texture layers
  for (let ly = 0; ly < 6; ly++) {
    const yy = 40 + ly * (H / 6);
    ctx.strokeStyle = t.wallHighlight;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.12;
    ctx.beginPath();
    const offset = -(game.frame * game.speed * 0.3 + ly * 60) % W;
    for (let wx = offset - 80; wx < W + 80; wx += 90) {
      ctx.moveTo(wx, yy);
      ctx.quadraticCurveTo(wx + 45, yy + (ly % 2 === 0 ? 10 : -10), wx + 90, yy);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Stalactites
  for (const st of stalactites) {
    const sx = ((st.x - game.frame * game.speed * 0.5) % (W * 2) + W * 2) % (W * 2) - W * 0.5;
    if (sx < -60 || sx > W + 60) continue;
    ctx.fillStyle = t.stalColor;
    ctx.beginPath();
    ctx.moveTo(sx - st.w / 2, 12);
    ctx.lineTo(sx + st.w / 2, 12);
    ctx.lineTo(sx + 2, 12 + st.h);
    ctx.lineTo(sx - 2, 12 + st.h);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = t.stalHighlight;
    ctx.beginPath();
    ctx.moveTo(sx - st.w / 2 + 3, 12);
    ctx.lineTo(sx, 12);
    ctx.lineTo(sx - 1, 12 + st.h * 0.7);
    ctx.closePath();
    ctx.fill();
  }

  // Stalagmites
  for (const st of stalagmites) {
    const sx = ((st.x - game.frame * game.speed * 0.5) % (W * 2) + W * 2) % (W * 2) - W * 0.5;
    if (sx < -60 || sx > W + 60) continue;
    ctx.fillStyle = t.stalColor;
    ctx.beginPath();
    ctx.moveTo(sx - st.w / 2, groundY);
    ctx.lineTo(sx + st.w / 2, groundY);
    ctx.lineTo(sx + 2, groundY - st.h);
    ctx.lineTo(sx - 2, groundY - st.h);
    ctx.closePath();
    ctx.fill();
  }

  // Floating particles
  for (const s of bgParticles) {
    const tw = (Math.sin(s.twinkle) + 1) / 2;
    ctx.fillStyle = `${t.particleColor}${(0.08 + tw * 0.25).toFixed(2)})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * (0.5 + tw * 0.5), 0, Math.PI * 2);
    ctx.fill();
  }

  // Torches
  const torchSpacing = 350;
  for (let ti = 0; ti < Math.ceil(W / torchSpacing) + 1; ti++) {
    const worldTx = ((ti * torchSpacing - game.frame * game.speed * 0.8) % (torchSpacing * 3) + torchSpacing * 3) % (torchSpacing * 3);
    if (worldTx < -50 || worldTx > W + 50) continue;
    const flicker = Math.sin(game.frame * 0.15 + ti * 77) * 5 + Math.sin(game.frame * 0.23 + ti * 33) * 3;
    const tGlow = ctx.createRadialGradient(worldTx, groundY - 10, 0, worldTx, groundY - 10, 90 + flicker);
    tGlow.addColorStop(0, `${t.torchGlow}${(0.14 * t.ambientLight).toFixed(2)})`);
    tGlow.addColorStop(1, `${t.torchGlow}0)`);
    ctx.fillStyle = tGlow;
    ctx.beginPath();
    ctx.arc(worldTx, groundY - 10, 90 + flicker, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5a3a10';
    ctx.fillRect(worldTx - 2, groundY - 22, 4, 22);
    ctx.fillStyle = `rgba(255,${150 + flicker * 3},30,${0.8 + Math.sin(game.frame * 0.2 + ti) * 0.15})`;
    ctx.beginPath();
    ctx.arc(worldTx, groundY - 25, 5 + flicker * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = t.groundFill;
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = t.groundLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  for (let gx = -(game.frame * game.speed) % 70; gx < W; gx += 70) {
    ctx.fillStyle = t.rockColor;
    ctx.beginPath();
    ctx.arc(gx + 12, groundY + 15, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = t.rockHighlight;
    ctx.beginPath();
    ctx.arc(gx + 45, groundY + 20, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ceiling
  ctx.fillStyle = t.ceilingFill;
  ctx.fillRect(0, 0, W, 14);
  ctx.strokeStyle = t.ceilingLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 14);
  for (let cx = 0; cx < W; cx += 12) {
    ctx.lineTo(cx, 14 + Math.sin(cx * 0.08 + game.frame * 0.01) * 4);
  }
  ctx.stroke();

  // === BIOME TRANSITION FLASH ===
  if (biomeTransition > 0) {
    biomeTransition--;
    const ba = (biomeTransition / 60);
    const biome = BIOMES[currentBiome];
    const bc = biome.nameColor;
    ctx.fillStyle = `rgba(255,255,255,${ba * 0.3})`;
    ctx.fillRect(0, 0, W, H);
    // Colored scan line
    const scanY = H * (1 - biomeTransition / 60);
    ctx.strokeStyle = bc;
    ctx.lineWidth = 3;
    ctx.globalAlpha = ba * 0.7;
    ctx.beginPath();
    ctx.moveTo(0, scanY);
    ctx.lineTo(W, scanY);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === Lava glow for Lava Depths biome ===
  if (currentBiome === 2) {
    const lavaGlow = Math.sin(game.frame * 0.02) * 0.04 + 0.06;
    ctx.fillStyle = `rgba(255, 60, 0, ${lavaGlow})`;
    ctx.fillRect(0, groundY - 10, W, H - groundY + 10);
    // Lava bubbles
    for (let lb = 0; lb < 4; lb++) {
      const lbx = ((game.frame * 0.5 + lb * 200) % W);
      const lbBob = Math.sin(game.frame * 0.08 + lb * 3) * 5;
      ctx.fillStyle = `rgba(255, 120, 20, ${0.3 + Math.sin(game.frame * 0.1 + lb) * 0.15})`;
      ctx.beginPath();
      ctx.arc(lbx, groundY + 15 + lbBob, 4 + Math.sin(game.frame * 0.15 + lb * 2) * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // === Ice crystals for Frozen Abyss biome ===
  if (currentBiome === 3) {
    ctx.globalAlpha = 0.12;
    for (let ic = 0; ic < 6; ic++) {
      const icx = ((game.frame * game.speed * 0.3 + ic * 180) % (W + 100)) - 50;
      const icy = 20 + ic * (H / 7);
      ctx.strokeStyle = '#aaddff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(icx, icy); ctx.lineTo(icx + 12, icy - 8); ctx.lineTo(icx + 24, icy);
      ctx.lineTo(icx + 12, icy + 8); ctx.closePath();
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // === Void swirls for Void Tunnels biome ===
  if (currentBiome === 4) {
    ctx.globalAlpha = 0.06;
    for (let vs = 0; vs < 3; vs++) {
      const vx = W / 2 + Math.cos(game.frame * 0.005 + vs * 2.1) * W * 0.3;
      const vy = H / 2 + Math.sin(game.frame * 0.007 + vs * 2.1) * H * 0.25;
      const vr = 80 + Math.sin(game.frame * 0.01 + vs) * 30;
      const vGrad = ctx.createRadialGradient(vx, vy, 0, vx, vy, vr);
      vGrad.addColorStop(0, 'rgba(180,100,255,0.3)');
      vGrad.addColorStop(1, 'rgba(180,100,255,0)');
      ctx.fillStyle = vGrad;
      ctx.beginPath();
      ctx.arc(vx, vy, vr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // === JETPACK PARTICLES ===
  for (const p of player.particles) {
    const alpha = p.life / p.maxLife;
    const r = p.size * alpha;
    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    gradient.addColorStop(0, `rgba(255, 200, 50, ${alpha})`);
    gradient.addColorStop(0.5, `rgba(255, 100, 20, ${alpha * 0.7})`);
    gradient.addColorStop(1, `rgba(255, 50, 0, 0)`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // === COLLECT EFFECTS ===
  for (const e of collectEffects) {
    const alpha = e.life / e.maxLife;
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }

  // === PLAYER (only if alive) ===
  if (game.state !== 'dead') {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.scale(player.scale, player.scale);
    ctx.translate(-player.x, -player.y);
    drawPlayer();
    ctx.restore();
  }

  // === DEATH PIECES ===
  for (const p of deathPieces) {
    const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(p.w, p.h) / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // === OBSTACLES ===
  for (const o of obstacles) {
    if (o.type === 'boulder') drawBoulder(o);
    else if (o.type === 'rollingStone') drawRollingStone(o);
else if (o.type === 'forkRock') drawForkRock(o);
  }

  // === CRYSTALS ===
  for (const c of coins) {
    if (c.collected) continue;
    drawCrystal(c.x, c.y, c.r, game.frame * 0.04 + c.x * 0.01);
  }

  // === FUEL CANS ===
  for (const fc of fuelCans) {
    if (fc.collected) continue;
    const bobY = fc.y + Math.sin(fc.bob) * 6;
    ctx.save();
    ctx.translate(fc.x, bobY);
    // Glow
    ctx.shadowColor = '#44ddff';
    ctx.shadowBlur = 8 + Math.sin(game.frame * 0.1) * 4;
    // Can body
    ctx.fillStyle = '#225588';
    ctx.beginPath();
    ctx.roundRect(-fc.w/2, -fc.h/2, fc.w, fc.h, 4);
    ctx.fill();
    // Fuel stripe
    const stripeGrad = ctx.createLinearGradient(0, -fc.h/2, 0, fc.h/2);
    stripeGrad.addColorStop(0, '#44ddff');
    stripeGrad.addColorStop(0.5, '#22aacc');
    stripeGrad.addColorStop(1, '#44ddff');
    ctx.fillStyle = stripeGrad;
    ctx.fillRect(-fc.w/2 + 3, -fc.h/2 + 4, fc.w - 6, fc.h - 8);
    // Nozzle
    ctx.fillStyle = '#556677';
    ctx.fillRect(-3, -fc.h/2 - 5, 6, 6);
    // Lightning bolt icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⚡', 0, 4);
    ctx.textAlign = 'left';
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // === FLOATING POPUPS ===
  for (const p of hudPopups) {
    const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    const scale = p.glow ? 1 + (1 - p.life / p.maxLife) * 0.3 : 1;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    if (p.glow) {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 20;
    }
    ctx.fillStyle = p.color;
    ctx.font = `bold ${p.size}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, 0, 0);
    ctx.textAlign = 'left';
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // === LEVEL UP FLASH ===
  if (levelUpFlash > 0) {
    const a = (levelUpFlash / 60) * 0.15;
    ctx.fillStyle = `rgba(200,100,255,${a})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // === GAMIFICATION HUD BAR ===
  drawHUD();

  // White flash overlay
  if (deathFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${(deathFlash / 8) * 0.4})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (game.state === 'menu') drawMenu();
  if (game.state === 'dead') drawDeath();

  ctx.restore();
}

// ===== DRAW PLAYER =====
function drawPlayer() {
  const px = player.x;
  const py = player.y;

  // Jetpack
  ctx.fillStyle = '#555';
  ctx.fillRect(px - 2, py + 8, 10, 24);
  ctx.fillStyle = '#777';
  ctx.fillRect(px, py + 10, 3, 20);
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(px + 6, py + 12, 12, 3);
  ctx.fillRect(px + 6, py + 24, 12, 3);
  ctx.fillStyle = '#444';
  ctx.fillRect(px - 1, py + 32, 8, 6);
  ctx.fillStyle = '#333';
  ctx.fillRect(px, py + 36, 6, 4);

  // Legs
  const legSwing = Math.sin(game.frame * 0.15) * 4;
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(px + 7, py + 33 + legSwing, 7, 9);
  ctx.fillStyle = '#654321';
  ctx.fillRect(px + 5, py + 39 + legSwing, 10, 4);
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(px + 17, py + 33 - legSwing, 7, 9);
  ctx.fillStyle = '#654321';
  ctx.fillRect(px + 16, py + 39 - legSwing, 10, 4);

  // Body
  ctx.fillStyle = '#cc8833';
  ctx.fillRect(px + 6, py + 12, 20, 22);
  ctx.fillStyle = '#7a5522';
  ctx.fillRect(px + 8, py + 12, 4, 22);
  ctx.fillRect(px + 20, py + 12, 4, 22);
  ctx.fillStyle = '#5a3a10';
  ctx.fillRect(px + 6, py + 28, 20, 4);
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(px + 14, py + 28, 5, 4);

  // Arms
  ctx.fillStyle = '#dda855';
  ctx.fillRect(px + 2, py + 14, 6, 14);
  ctx.fillRect(px + 24, py + 14, 6, 14);
  ctx.fillStyle = '#aa7733';
  ctx.fillRect(px + 2, py + 26, 6, 4);
  ctx.fillRect(px + 24, py + 26, 6, 4);

  // Pickaxe
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(px + 28, py + 28);
  ctx.lineTo(px + 40, py + 10);
  ctx.stroke();
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.moveTo(px + 40, py + 10);
  ctx.lineTo(px + 48, py + 6);
  ctx.lineTo(px + 46, py + 10);
  ctx.lineTo(px + 42, py + 16);
  ctx.lineTo(px + 38, py + 12);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.beginPath();
  ctx.moveTo(px + 42, py + 8);
  ctx.lineTo(px + 47, py + 7);
  ctx.lineTo(px + 45, py + 10);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#dda855';
  ctx.fillRect(px + 12, py + 6, 8, 8);
  ctx.beginPath();
  ctx.arc(px + 16, py + 4, 10, 0, Math.PI * 2);
  ctx.fill();

  // Beard
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.arc(px + 16, py + 9, 8, 0, Math.PI);
  ctx.fill();
  ctx.fillStyle = '#7a5a10';
  ctx.beginPath();
  ctx.moveTo(px + 9, py + 8);
  ctx.quadraticCurveTo(px + 16, py + 20, px + 23, py + 8);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px + 13, py + 2, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px + 20, py + 2, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(px + 14, py + 2, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px + 21, py + 2, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#cc9944';
  ctx.beginPath();
  ctx.arc(px + 17, py + 5, 2, 0, Math.PI * 2);
  ctx.fill();

  // Hat
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.ellipse(px + 16, py - 5, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#a07818';
  ctx.fillRect(px + 7, py - 16, 18, 12);
  ctx.beginPath();
  ctx.arc(px + 16, py - 16, 9, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#654321';
  ctx.fillRect(px + 7, py - 7, 18, 3);

  // Thrust
  if (player.thrust) {
    const tGrad = ctx.createRadialGradient(px + 3, py + player.h + 8, 0, px + 3, py + player.h + 8, 22);
    tGrad.addColorStop(0, 'rgba(255, 220, 80, 0.9)');
    tGrad.addColorStop(0.3, 'rgba(255, 140, 20, 0.6)');
    tGrad.addColorStop(0.6, 'rgba(255, 60, 0, 0.3)');
    tGrad.addColorStop(1, 'rgba(255, 30, 0, 0)');
    ctx.fillStyle = tGrad;
    ctx.beginPath();
    ctx.arc(px + 3, py + player.h + 8, 22, 0, Math.PI * 2);
    ctx.fill();
    const flicker = Math.random() * 8;
    ctx.fillStyle = 'rgba(255, 255, 150, 0.7)';
    ctx.beginPath();
    ctx.moveTo(px - 2, py + 38);
    ctx.lineTo(px + 8, py + 38);
    ctx.lineTo(px + 3, py + 52 + flicker);
    ctx.closePath();
    ctx.fill();
  }
}

// ===== DRAW BOULDER =====
function drawBoulder(o) {
  ctx.save();
  ctx.translate(o.x + o.w / 2, o.y + o.h / 2);
  ctx.rotate(o.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.arc(3, 3, o.radius, 0, Math.PI * 2);
  ctx.fill();
  const sg = ctx.createRadialGradient(-4, -4, 2, 0, 0, o.radius);
  sg.addColorStop(0, '#8a7a6a');
  sg.addColorStop(0.5, '#6a5a4a');
  sg.addColorStop(1, '#4a3a2a');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.arc(0, 0, o.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#3a2a1a';
  ctx.lineWidth = 1.5;
  for (const c of o.cracks) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(c.a) * o.radius * c.l, Math.sin(c.a) * o.radius * c.l);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.arc(-o.radius * 0.3, -o.radius * 0.3, o.radius * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ===== DRAW ROLLING STONE =====
function drawRollingStone(o) {
  if (o.warning > 0) {
    const alpha = (Math.sin(game.frame * 0.3) + 1) / 2;
    ctx.fillStyle = `rgba(200,140,60,${alpha * 0.7})`;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('RUMBLE!', canvas.width - 20, o.warningY - 5);
    ctx.textAlign = 'left';
    ctx.strokeStyle = `rgba(180,130,60,${alpha * 0.2})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(0, o.warningY);
    ctx.lineTo(canvas.width, o.warningY);
    ctx.stroke();
    ctx.setLineDash([]);
    if (o.warning < 20 && o.warning % 5 === 0) playRumbleSound();
    return;
  }
  ctx.save();
  ctx.translate(o.x + o.w / 2, o.y);
  ctx.rotate(o.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.arc(4, 4, o.radius + 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6a5540';
  ctx.beginPath();
  for (let i = 0; i < o.bumps.length; i++) {
    const a = (Math.PI * 2 / o.bumps.length) * i;
    const bx = Math.cos(a) * o.bumps[i];
    const by = Math.sin(a) * o.bumps[i];
    if (i === 0) ctx.moveTo(bx, by);
    else ctx.lineTo(bx, by);
  }
  ctx.closePath();
  ctx.fill();
  const ig = ctx.createRadialGradient(-5, -5, 2, 0, 0, o.radius);
  ig.addColorStop(0, 'rgba(160,140,110,0.4)');
  ig.addColorStop(1, 'rgba(60,40,20,0.3)');
  ctx.fillStyle = ig;
  ctx.beginPath();
  ctx.arc(0, 0, o.radius * 0.9, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Dust trail
  for (let d = 0; d < 3; d++) {
    ctx.fillStyle = `rgba(140,120,90,${0.12 + Math.random() * 0.08})`;
    ctx.beginPath();
    ctx.arc(o.x + o.w + 10 + d * 14, o.y + (Math.random() - 0.5) * 15, Math.random() * 6 + 3, 0, Math.PI * 2);
    ctx.fill();
  }
}


function drawForkRock(o) {
  const trunkH = o.h * 0.55;
  const trunkX = o.x + o.w * 0.32;
  const trunkW = o.w * 0.36;
  const trunkY = o.side === 'top' ? o.y : o.y + o.h - trunkH;

  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(trunkX + 4, trunkY + 4, trunkW, trunkH);

  const rockGrad = ctx.createLinearGradient(o.x, o.y, o.x + o.w, o.y + o.h);
  rockGrad.addColorStop(0, '#8a745c');
  rockGrad.addColorStop(0.55, '#5e4935');
  rockGrad.addColorStop(1, '#3d2d1d');

  ctx.fillStyle = rockGrad;
  ctx.beginPath();
  if (o.side === 'top') {
    ctx.moveTo(trunkX, o.y);
    ctx.lineTo(trunkX + trunkW, o.y);
    ctx.lineTo(trunkX + trunkW, trunkY + trunkH);
    ctx.lineTo(trunkX, trunkY + trunkH);
  } else {
    ctx.moveTo(trunkX, trunkY);
    ctx.lineTo(trunkX + trunkW, trunkY);
    ctx.lineTo(trunkX + trunkW, o.y + o.h);
    ctx.lineTo(trunkX, o.y + o.h);
  }
  ctx.closePath();
  ctx.fill();

  for (const prong of o.prongs) {
    const prongX = o.x + prong.offset;
    const tipY = o.side === 'top' ? o.y + o.h : o.y;
    const rootY = o.side === 'top' ? trunkY + trunkH * 0.82 : trunkY + trunkH * 0.18;

    ctx.beginPath();
    ctx.moveTo(prongX - prong.width * 0.5, rootY);
    ctx.lineTo(prongX + prong.lean, tipY);
    ctx.lineTo(prongX + prong.width * 0.5, rootY);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.moveTo(prongX - prong.width * 0.18, rootY + o.direction * 4);
    ctx.lineTo(prongX + prong.lean * 0.55, tipY - o.direction * 12);
    ctx.lineTo(prongX + prong.width * 0.1, rootY + o.direction * 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = rockGrad;
  }

  ctx.strokeStyle = 'rgba(40,25,12,0.55)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(trunkX + trunkW * 0.45, trunkY + 8);
  ctx.lineTo(trunkX + trunkW * 0.3, trunkY + trunkH * 0.45);
  ctx.lineTo(trunkX + trunkW * 0.6, trunkY + trunkH * 0.88);
  ctx.stroke();
}

// ===== DRAW CRYSTAL =====
function drawCrystal(cx, cy, size, rotation) {
  ctx.save();
  ctx.translate(cx, cy);
  const s = size * 1.4;
  const scaleX = Math.cos(rotation);
  const absScale = Math.abs(scaleX);
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 2.5);
  glow.addColorStop(0, 'rgba(255,215,0,0.25)');
  glow.addColorStop(0.5, 'rgba(255,180,0,0.08)');
  glow.addColorStop(1, 'rgba(255,150,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, s * 2.5, 0, Math.PI * 2);
  ctx.fill();
  const hw = s * 0.8;
  const ls = scaleX > 0 ? 1 : -1;
  if (absScale > 0.05) {
    ctx.fillStyle = scaleX > 0 ? '#8B6914' : '#daa520';
    ctx.beginPath(); ctx.moveTo(0, -s*1.3); ctx.lineTo(-hw*absScale, 0); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = scaleX > 0 ? '#daa520' : '#8B6914';
    ctx.beginPath(); ctx.moveTo(0, -s*1.3); ctx.lineTo(hw*absScale, 0); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = scaleX > 0 ? '#996515' : '#cc9a20';
    ctx.beginPath(); ctx.moveTo(0, s*1.3); ctx.lineTo(-hw*absScale, 0); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = scaleX > 0 ? '#cc9a20' : '#996515';
    ctx.beginPath(); ctx.moveTo(0, s*1.3); ctx.lineTo(hw*absScale, 0); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(255,240,150,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, -s*1.3); ctx.lineTo(0, s*1.3); ctx.stroke();
    const hlX = ls * hw * absScale * 0.4;
    const hlG = ctx.createRadialGradient(hlX, -s*0.3, 0, hlX, -s*0.3, s*0.5);
    hlG.addColorStop(0, 'rgba(255,255,220,0.6)'); hlG.addColorStop(1, 'rgba(255,255,220,0)');
    ctx.fillStyle = hlG;
    ctx.beginPath(); ctx.arc(hlX, -s*0.3, s*0.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,230,100,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,-s*1.3); ctx.lineTo(-hw*absScale,0); ctx.lineTo(0,s*1.3); ctx.lineTo(hw*absScale,0); ctx.closePath(); ctx.stroke();
  } else {
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(0, -s*1.3); ctx.lineTo(0, s*1.3); ctx.stroke(); ctx.shadowBlur = 0;
  }
  const sparkle = Math.sin(rotation * 3) * 0.5 + 0.5;
  if (sparkle > 0.7) {
    ctx.fillStyle = `rgba(255,255,255,${(sparkle-0.7)*3})`;
    const sx = Math.cos(rotation*5)*s*0.6, sy = Math.sin(rotation*7)*s*0.6;
    ctx.beginPath(); ctx.moveTo(sx,sy-3); ctx.lineTo(sx+1,sy); ctx.lineTo(sx,sy+3); ctx.lineTo(sx-1,sy); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ===== GAMIFICATION HUD BAR =====
function drawHUD() {
  const W = canvas.width;
  const barH = 52;
  const barY = 4;

  // Main bar background with gradient border
  const barGrad = ctx.createLinearGradient(0, barY, 0, barY + barH);
  barGrad.addColorStop(0, 'rgba(0,0,0,0.55)');
  barGrad.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = barGrad;
  ctx.beginPath();
  ctx.roundRect(8, barY, W - 16, barH, 10);
  ctx.fill();
  // Glowing bottom edge
  const edgeGrad = ctx.createLinearGradient(0, barY + barH - 2, 0, barY + barH);
  edgeGrad.addColorStop(0, 'rgba(100,180,255,0.3)');
  edgeGrad.addColorStop(1, 'rgba(100,180,255,0)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(12, barY + barH - 2, W - 24, 2);

  // === LEFT SECTION: Score + Level + Distance bar ===
  const leftX = 22;
  // Rank badge
  ctx.fillStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.arc(leftX + 16, barY + 26, 16, 0, Math.PI * 2);
  ctx.fill();
  const rankGrad = ctx.createLinearGradient(leftX, barY + 10, leftX + 32, barY + 42);
  rankGrad.addColorStop(0, xpLevel >= 5 ? '#ff44ff' : xpLevel >= 3 ? '#44aaff' : '#ffd700');
  rankGrad.addColorStop(1, xpLevel >= 5 ? '#aa00aa' : xpLevel >= 3 ? '#2266cc' : '#cc8800');
  ctx.strokeStyle = rankGrad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(leftX + 16, barY + 26, 16, 0, Math.PI * 2);
  ctx.stroke();
  // XP ring around badge
  const xpProgress = xp / xpToNext;
  ctx.strokeStyle = xpLevel >= 5 ? '#ff66ff' : xpLevel >= 3 ? '#66ccff' : '#ffdd44';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(leftX + 16, barY + 26, 16, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * xpProgress);
  ctx.stroke();
  // Rank number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(xpLevel.toString(), leftX + 16, barY + 31);
  ctx.textAlign = 'left';

  // Score
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('SCORE', leftX + 40, barY + 14);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(Math.floor(game.score).toLocaleString(), leftX + 40, barY + 36);

  // Level badge
  const lvlColors = ['#44aa44', '#44aaff', '#ffaa00', '#ff4444'];
  const lvlColor = lvlColors[Math.min(game.level - 1, 3)];
  const lvlX = leftX + 180;
  ctx.fillStyle = lvlColor;
  ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.roundRect(lvlX, barY + 8, 70, 18, 4);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = lvlColor;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(lvlX, barY + 8, 70, 18, 4);
  ctx.stroke();
  ctx.fillStyle = lvlColor;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  const lvlNames = ['EASY', 'MEDIUM', 'HARD', 'INSANE'];
  ctx.fillText(lvlNames[Math.min(game.level - 1, 3)], lvlX + 35, barY + 21);
  ctx.textAlign = 'left';

  // Distance progress bar — CHONKY & GLOWY
  const milestone = 5000;
  const progress = (game.score % milestone) / milestone;
  const biomeIdx = getBiomeIndex();
  const nextBiomeName = biomeIdx < BIOMES.length - 1 ? BIOMES[biomeIdx + 1].name : 'MAX';
  const biomeColor = BIOMES[biomeIdx].nameColor;
  const dpX = lvlX;
  const dpW = 140;
  const dpY = barY + 32;
  const dpH = 14;

  // Bar background with inner shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(dpX - 1, dpY - 1, dpW + 2, dpH + 2, 8);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.beginPath();
  ctx.roundRect(dpX, dpY, dpW, dpH, 7);
  ctx.fill();

  // Filled portion with gradient + glow
  const fillW = Math.max(6, dpW * progress);
  const dpGrad = ctx.createLinearGradient(dpX, 0, dpX + fillW, 0);
  dpGrad.addColorStop(0, biomeColor);
  dpGrad.addColorStop(0.7, '#ffffff');
  dpGrad.addColorStop(1, biomeColor);
  ctx.shadowColor = biomeColor;
  ctx.shadowBlur = 10;
  ctx.fillStyle = dpGrad;
  ctx.beginPath();
  ctx.roundRect(dpX, dpY, fillW, dpH, 7);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Animated shine sweep
  const shineX = dpX + ((game.frame * 1.5) % (dpW + 40)) - 20;
  if (shineX < dpX + fillW) {
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(dpX, dpY, fillW, dpH, 7);
    ctx.clip();
    const shineGrad = ctx.createLinearGradient(shineX - 15, 0, shineX + 15, 0);
    shineGrad.addColorStop(0, 'rgba(255,255,255,0)');
    shineGrad.addColorStop(0.5, 'rgba(255,255,255,0.35)');
    shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shineGrad;
    ctx.fillRect(shineX - 15, dpY, 30, dpH);
    ctx.restore();
  }

  // Inner highlight line at top
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dpX + 4, dpY + 2);
  ctx.lineTo(dpX + fillW - 4, dpY + 2);
  ctx.stroke();

  // Border glow
  ctx.strokeStyle = biomeColor + '55';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(dpX, dpY, dpW, dpH, 7);
  ctx.stroke();

  // Km markers (little ticks)
  for (let km = 1; km < 5; km++) {
    const tickX = dpX + (dpW / 5) * km;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(tickX, dpY + 2, 1, dpH - 4);
  }

  // Percentage text inside bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(progress * 100)}%`, dpX + dpW / 2, dpY + 11);
  ctx.textAlign = 'left';

  // Next biome label
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '8px monospace';
  ctx.fillText(`${nextBiomeName}`, dpX + dpW + 6, dpY + 10);

  // Current biome name (tiny, above bar)
  ctx.fillStyle = biomeColor;
  ctx.font = 'bold 8px monospace';
  ctx.fillText(BIOMES[biomeIdx].name, dpX, dpY - 3);

  // === CENTER: Combo + Day/Night Toggle ===
  const centerX = W / 2;

  // Combo display (above toggle if active)
  if (combo > 1) {
    const comboScale = 1 + Math.sin(game.frame * 0.2) * 0.05;
    const comboColors = ['#ffd700', '#ffd700', '#66ffff', '#66ffff', '#ff66ff', '#ff66ff', '#ff66ff', '#ff2222', '#ff2222', '#ff2222', '#ff0000'];
    const cc = comboColors[Math.min(combo, 10)];
    ctx.save();
    ctx.translate(centerX, barY + 14);
    ctx.scale(comboScale, comboScale);
    ctx.shadowColor = cc;
    ctx.shadowBlur = 12;
    ctx.fillStyle = cc;
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${combo}x COMBO`, 0, 0);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left';
    ctx.restore();
    // Combo timer bar
    const ctW = 60;
    const ctH = 3;
    const ctX = centerX - ctW / 2;
    const ctY = barY + 18;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(ctX, ctY, ctW, ctH);
    ctx.fillStyle = cc;
    ctx.fillRect(ctX, ctY, ctW * (comboTimer / 90), ctH);
  }

  // Day/Night toggle
  const toggleW = 80;
  const toggleH = 24;
  const toggleX = centerX - toggleW / 2;
  const toggleY = barY + (combo > 1 ? 26 : 14);
  ctx.fillStyle = nightMode ? 'rgba(20,20,60,0.9)' : 'rgba(110,80,30,0.9)';
  ctx.beginPath();
  ctx.roundRect(toggleX, toggleY, toggleW, toggleH, 12);
  ctx.fill();
  ctx.strokeStyle = nightMode ? 'rgba(80,80,180,0.4)' : 'rgba(200,160,60,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(toggleX, toggleY, toggleW, toggleH, 12);
  ctx.stroke();
  const knobX = nightMode ? toggleX + toggleW - 21 : toggleX + 5;
  ctx.fillStyle = nightMode ? '#6666cc' : '#ffcc33';
  ctx.beginPath();
  ctx.arc(knobX + 8, toggleY + 12, 8, 0, Math.PI * 2);
  ctx.fill();
  if (nightMode) {
    ctx.fillStyle = 'rgba(20,20,60,1)';
    ctx.beginPath();
    ctx.arc(knobX + 11, toggleY + 10, 7, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.strokeStyle = '#ffcc33'; ctx.lineWidth = 1.2;
    for (let r = 0; r < 6; r++) {
      const ra = (Math.PI * 2 / 6) * r + game.frame * 0.02;
      ctx.beginPath();
      ctx.moveTo(knobX + 8 + Math.cos(ra) * 10, toggleY + 12 + Math.sin(ra) * 10);
      ctx.lineTo(knobX + 8 + Math.cos(ra) * 13, toggleY + 12 + Math.sin(ra) * 13);
      ctx.stroke();
    }
  }

  // Best score (subtle, under toggle)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`BEST: ${game.highScore.toLocaleString()}m`, centerX, barY + barH - 2);
  ctx.textAlign = 'left';

  // === RIGHT SECTION: Crystals + Near Misses ===
  ctx.textAlign = 'right';
  const rightX = W - 22;

  // Crystal counter
  ctx.fillStyle = 'rgba(255,215,0,0.5)';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('CRYSTALS', rightX, barY + 14);
  // Animated crystal icon
  const cRot = game.frame * 0.06;
  const cScale = Math.abs(Math.cos(cRot));
  ctx.save();
  ctx.translate(rightX - 90, barY + 30);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.lineTo(6 * cScale, 0); ctx.lineTo(0, 8); ctx.lineTo(-6 * cScale, 0);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,230,100,0.6)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -8); ctx.lineTo(6 * cScale, 0); ctx.lineTo(0, 8); ctx.lineTo(-6 * cScale, 0);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
  // Count
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(game.crystalsCollected.toString(), rightX - 100, barY + 36);

  // Near miss counter
  if (nearMissCount > 0) {
    ctx.fillStyle = '#44ff44';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(`DODGES: ${nearMissCount}`, rightX, barY + 48);
  }

  // Fuel gauge (vertical bar on far right)
  ctx.textAlign = 'left';
  const fgX = W - 30;
  const fgY = barY + barH + 10;
  const fgW = 18;
  const fgH = canvas.height - fgY - 60;
  const fuelPct = fuel / fuelMax;

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(fgX - 1, fgY - 1, fgW + 2, fgH + 2, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.beginPath();
  ctx.roundRect(fgX, fgY, fgW, fgH, 5);
  ctx.fill();

  // Filled portion (fills from bottom up)
  const fillH = Math.max(4, fgH * fuelPct);
  const fuelColor = fuelPct > 0.5 ? '#44ddff' : fuelPct > 0.25 ? '#ffaa22' : '#ff3333';
  const fuelGrad = ctx.createLinearGradient(0, fgY + fgH - fillH, 0, fgY + fgH);
  fuelGrad.addColorStop(0, fuelColor);
  fuelGrad.addColorStop(0.5, '#ffffff');
  fuelGrad.addColorStop(1, fuelColor);

  // Glow when boosted or warning flash
  if (fuelBoost > 0) {
    ctx.shadowColor = '#44ffff';
    ctx.shadowBlur = 15;
  } else if (fuelWarning > 0) {
    ctx.shadowColor = '#ff3333';
    ctx.shadowBlur = 12;
  }
  ctx.fillStyle = fuelGrad;
  ctx.beginPath();
  ctx.roundRect(fgX, fgY + fgH - fillH, fgW, fillH, 5);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Tick marks
  for (let t = 1; t < 4; t++) {
    const ty = fgY + (fgH / 4) * t;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(fgX + 2, ty, fgW - 4, 1);
  }

  // Border
  ctx.strokeStyle = fuelPct > 0.25 ? 'rgba(68,221,255,0.3)' : 'rgba(255,50,50,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(fgX, fgY, fgW, fgH, 5);
  ctx.stroke();

  // Label
  ctx.save();
  ctx.translate(fgX + fgW / 2, fgY - 4);
  ctx.fillStyle = fuelPct > 0.25 ? '#44ddff' : '#ff3333';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('FUEL', 0, 0);
  ctx.restore();

  // Percentage
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(fuelPct * 100)}%`, fgX + fgW / 2, fgY + fgH + 12);
  ctx.textAlign = 'left';
}

// ===== MENU =====
function drawMenu() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  // Animated vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  const cy = H / 2;

  // Title with glow
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${Math.min(W * 0.07, 56)}px monospace`;
  ctx.fillText('GOLD DIGGER', W / 2, cy - 90);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#aa7733';
  ctx.font = `bold ${Math.min(W * 0.035, 28)}px monospace`;
  ctx.fillText('UNDERGROUND', W / 2, cy - 52);

  // Animated pickaxe divider
  const divW = 200;
  ctx.strokeStyle = 'rgba(255,215,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - divW/2, cy - 35);
  ctx.lineTo(W/2 + divW/2, cy - 35);
  ctx.stroke();
  // Animated crystal in center of divider
  const dCrot = game.frame * 0.05;
  ctx.save();
  ctx.translate(W/2, cy - 35);
  ctx.fillStyle = '#ffd700';
  const dCS = Math.abs(Math.cos(dCrot));
  ctx.beginPath();
  ctx.moveTo(0, -6); ctx.lineTo(5 * dCS, 0); ctx.lineTo(0, 6); ctx.lineTo(-5 * dCS, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Feature cards
  const cardData = [
    { icon: 'SPACE', text: 'Hold to fly', color: '#66aaff' },
    { icon: 'xCOMBO', text: 'Chain crystals', color: '#ff66ff' },
    { icon: 'DODGE', text: 'Near miss bonus', color: '#44ff44' },
    { icon: 'N', text: 'Toggle day/night', color: '#ffcc33' },
  ];
  const cardW = Math.min(150, (W - 80) / 4);
  const cardStartX = W / 2 - (cardW * 4 + 20 * 3) / 2;
  const cardY = cy - 15;
  for (let i = 0; i < 4; i++) {
    const cd = cardData[i];
    const cx = cardStartX + i * (cardW + 20);
    const bobY = Math.sin(game.frame * 0.03 + i * 1.2) * 3;

    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath();
    ctx.roundRect(cx, cardY + bobY, cardW, 55, 6);
    ctx.fill();
    ctx.strokeStyle = `${cd.color}44`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(cx, cardY + bobY, cardW, 55, 6);
    ctx.stroke();

    ctx.fillStyle = cd.color;
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(cd.icon, cx + cardW / 2, cardY + bobY + 22);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '10px monospace';
    ctx.fillText(cd.text, cx + cardW / 2, cardY + bobY + 42);
  }

  // Start button
  const alpha = (Math.sin(game.frame * 0.06) + 1) / 2;
  const btnW = 220;
  const btnH = 44;
  const btnX = W / 2 - btnW / 2;
  const btnY = cy + 65;
  ctx.fillStyle = `rgba(255,215,0,${0.15 + alpha * 0.1})`;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 8);
  ctx.fill();
  ctx.strokeStyle = `rgba(255,215,0,${0.5 + alpha * 0.5})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 8);
  ctx.stroke();
  ctx.fillStyle = `rgba(255,255,255,${0.7 + alpha * 0.3})`;
  ctx.font = `bold ${Math.min(W * 0.025, 20)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('TAP TO START', W / 2, btnY + 28);

  if (game.highScore > 0) {
    ctx.fillStyle = 'rgba(255,215,0,0.6)';
    ctx.font = '13px monospace';
    ctx.fillText(`HIGH SCORE: ${game.highScore.toLocaleString()}m`, W / 2, btnY + btnH + 30);
  }
  ctx.textAlign = 'left';
}

// ===== DEATH =====
// Share card state
let shareCardReady = false;
let shareBtn = { x: 0, y: 0, w: 0, h: 0 };
let retryBtn = { x: 0, y: 0, w: 0, h: 0 };

function getRankTitle(level) {
  const titles = ['Rookie Miner', 'Tunnel Rat', 'Shaft Diver', 'Ore Hunter', 'Vein Striker',
    'Deep Driller', 'Cave Master', 'Gold Baron', 'Diamond Hand', 'Legendary Digger'];
  return titles[Math.min(level - 1, titles.length - 1)];
}

function getBiomeName() {
  const idx = getBiomeIndex();
  return BIOMES[Math.min(idx, BIOMES.length - 1)].name;
}

function drawDeath() {
  const W = canvas.width;
  const H = canvas.height;

  // Dark overlay
  ctx.fillStyle = 'rgba(10,5,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  const cy = H / 2;
  ctx.textAlign = 'center';

  // CRUSHED with shake
  const shk = screenShake > 0 ? screenShake * 0.5 : 0;
  ctx.save();
  ctx.translate((Math.random()-0.5)*shk, (Math.random()-0.5)*shk);
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff3333';
  ctx.font = `bold ${Math.min(W * 0.06, 48)}px monospace`;
  ctx.fillText('CRUSHED!', W / 2, cy - 180);
  ctx.shadowBlur = 0;
  ctx.restore();

  // === SHARE CARD ===
  const cardW = Math.min(420, W * 0.55);
  const cardH = 340;
  const cardX = W / 2 - cardW / 2;
  const cardY = cy - 150;

  // Card background — dark gold parchment feel
  const cardBg = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  cardBg.addColorStop(0, 'rgba(40,30,10,0.92)');
  cardBg.addColorStop(0.5, 'rgba(50,35,15,0.95)');
  cardBg.addColorStop(1, 'rgba(30,20,8,0.92)');
  ctx.fillStyle = cardBg;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, 16);
  ctx.fill();

  // Gold border with glow
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 12;
  const borderGrad = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + cardH);
  borderGrad.addColorStop(0, '#cc8800');
  borderGrad.addColorStop(0.3, '#ffd700');
  borderGrad.addColorStop(0.7, '#ffee88');
  borderGrad.addColorStop(1, '#cc8800');
  ctx.strokeStyle = borderGrad;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, 16);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Inner decorative border
  ctx.strokeStyle = 'rgba(255,215,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(cardX + 6, cardY + 6, cardW - 12, cardH - 12, 12);
  ctx.stroke();

  // Corner pickaxe decorations
  const corners = [[cardX + 16, cardY + 16], [cardX + cardW - 16, cardY + 16],
                   [cardX + 16, cardY + cardH - 16], [cardX + cardW - 16, cardY + cardH - 16]];
  ctx.fillStyle = '#ffd700';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  for (const [cx2, cy2] of corners) {
    ctx.fillText('⛏', cx2, cy2 + 5);
  }

  // Title: GOLD DIGGER
  const titleY = cardY + 38;
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${Math.min(cardW * 0.08, 28)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GOLD DIGGER', W / 2, titleY);
  ctx.shadowBlur = 0;

  // Rank title
  const rankTitle = getRankTitle(xpLevel);
  ctx.fillStyle = xpLevel >= 5 ? '#ff66ff' : xpLevel >= 3 ? '#66ccff' : '#ffcc44';
  ctx.font = `bold ${Math.min(cardW * 0.05, 16)}px monospace`;
  ctx.fillText(rankTitle, W / 2, titleY + 22);

  // Divider line
  const divY = titleY + 32;
  const divGrad = ctx.createLinearGradient(cardX + 30, 0, cardX + cardW - 30, 0);
  divGrad.addColorStop(0, 'rgba(255,215,0,0)');
  divGrad.addColorStop(0.3, 'rgba(255,215,0,0.5)');
  divGrad.addColorStop(0.5, 'rgba(255,230,100,0.8)');
  divGrad.addColorStop(0.7, 'rgba(255,215,0,0.5)');
  divGrad.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = divGrad;
  ctx.fillRect(cardX + 30, divY, cardW - 60, 1.5);

  // Big distance display
  const distY = divY + 35;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('DISTANCE MINED', W / 2, distY - 8);
  ctx.shadowColor = '#66aaff';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#88ccff';
  ctx.font = `bold ${Math.min(cardW * 0.1, 36)}px monospace`;
  ctx.fillText(`${Math.floor(game.score).toLocaleString()}m`, W / 2, distY + 22);
  ctx.shadowBlur = 0;

  // Biome reached
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px monospace';
  ctx.fillText(`Reached: ${getBiomeName()}`, W / 2, distY + 38);

  // Stats grid (2 columns)
  const gridY = distY + 58;
  const colW = (cardW - 60) / 2;
  const gridStats = [
    { label: 'CRYSTALS', value: game.crystalsCollected.toString(), color: '#ffd700', emoji: '💎' },
    { label: 'MAX COMBO', value: `${maxCombo}x`, color: '#ff66ff', emoji: '🔥' },
    { label: 'FUEL LEFT', value: `${Math.floor(fuel)}%`, color: '#44ddff', emoji: '⛽' },
    { label: 'DODGES', value: nearMissCount.toString(), color: '#44ff44', emoji: '💨' },
    { label: 'RANK', value: `Lv.${xpLevel}`, color: xpLevel >= 5 ? '#ff44ff' : xpLevel >= 3 ? '#44aaff' : '#ffd700', emoji: '⭐' },
    { label: 'SCALE', value: `${player.scale.toFixed(2)}x`, color: '#ffaa44', emoji: '📏' },
  ];

  for (let i = 0; i < gridStats.length; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const sx = cardX + 30 + col * colW;
    const sy = gridY + row * 30;
    const s = gridStats[i];

    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '9px monospace';
    ctx.fillText(`${s.emoji} ${s.label}`, sx, sy);
    ctx.fillStyle = s.color;
    ctx.font = 'bold 14px monospace';
    ctx.fillText(s.value, sx, sy + 16);
  }

  // New high score banner
  if (game.score >= game.highScore && game.score > 0) {
    const bannerAlpha = (Math.sin(game.frame * 0.08) + 1) / 2;
    const bannerY = cardY + cardH - 22;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 12;
    ctx.fillStyle = `rgba(255,215,0,${0.8 + bannerAlpha * 0.2})`;
    ctx.font = `bold 13px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('⭐ NEW HIGH SCORE! ⭐', W / 2, bannerY);
    ctx.shadowBlur = 0;
  }

  // Watermark
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('antara-paul04.github.io/stupid-game', W / 2, cardY + cardH - 8);

  // === BUTTONS ===
  const alpha = (Math.sin(game.frame * 0.06) + 1) / 2;
  const btnW2 = 150;
  const btnH2 = 42;
  const btnGap = 16;
  const btnBaseY = cardY + cardH + 18;

  // Share button
  shareBtn.w = btnW2; shareBtn.h = btnH2;
  shareBtn.x = W / 2 - btnW2 - btnGap / 2;
  shareBtn.y = btnBaseY;
  const shareGrad = ctx.createLinearGradient(shareBtn.x, btnBaseY, shareBtn.x, btnBaseY + btnH2);
  shareGrad.addColorStop(0, `rgba(255,180,0,${0.15 + alpha * 0.1})`);
  shareGrad.addColorStop(1, `rgba(200,140,0,${0.1 + alpha * 0.1})`);
  ctx.fillStyle = shareGrad;
  ctx.beginPath();
  ctx.roundRect(shareBtn.x, btnBaseY, btnW2, btnH2, 8);
  ctx.fill();
  ctx.strokeStyle = `rgba(255,200,50,${0.5 + alpha * 0.4})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(shareBtn.x, btnBaseY, btnW2, btnH2, 8);
  ctx.stroke();
  ctx.fillStyle = `rgba(255,220,100,${0.8 + alpha * 0.2})`;
  ctx.font = `bold 15px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('📤 SHARE', shareBtn.x + btnW2 / 2, btnBaseY + 27);

  // Retry button
  retryBtn.w = btnW2; retryBtn.h = btnH2;
  retryBtn.x = W / 2 + btnGap / 2;
  retryBtn.y = btnBaseY;
  ctx.fillStyle = `rgba(255,80,80,${0.1 + alpha * 0.1})`;
  ctx.beginPath();
  ctx.roundRect(retryBtn.x, btnBaseY, btnW2, btnH2, 8);
  ctx.fill();
  ctx.strokeStyle = `rgba(255,100,100,${0.5 + alpha * 0.5})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(retryBtn.x, btnBaseY, btnW2, btnH2, 8);
  ctx.stroke();
  ctx.fillStyle = `rgba(255,255,255,${0.7 + alpha * 0.3})`;
  ctx.font = `bold 15px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('🔄 RETRY', retryBtn.x + btnW2 / 2, btnBaseY + 27);

  ctx.textAlign = 'left';
  shareCardReady = true;
}

// Generate share card as image
function generateShareImage() {
  const sc = document.createElement('canvas');
  const sctx = sc.getContext('2d');
  sc.width = 600;
  sc.height = 400;

  // Background
  const bg = sctx.createLinearGradient(0, 0, 600, 400);
  bg.addColorStop(0, '#1a0e05');
  bg.addColorStop(0.5, '#2a1a0a');
  bg.addColorStop(1, '#0f0a03');
  sctx.fillStyle = bg;
  sctx.fillRect(0, 0, 600, 400);

  // Gold border
  sctx.shadowColor = '#ffd700';
  sctx.shadowBlur = 8;
  const brd = sctx.createLinearGradient(0, 0, 600, 400);
  brd.addColorStop(0, '#cc8800');
  brd.addColorStop(0.5, '#ffd700');
  brd.addColorStop(1, '#cc8800');
  sctx.strokeStyle = brd;
  sctx.lineWidth = 3;
  sctx.beginPath();
  sctx.roundRect(8, 8, 584, 384, 16);
  sctx.stroke();
  sctx.shadowBlur = 0;

  // Inner border
  sctx.strokeStyle = 'rgba(255,215,0,0.15)';
  sctx.lineWidth = 1;
  sctx.beginPath();
  sctx.roundRect(14, 14, 572, 372, 12);
  sctx.stroke();

  // Title
  sctx.textAlign = 'center';
  sctx.shadowColor = '#ffd700';
  sctx.shadowBlur = 12;
  sctx.fillStyle = '#ffd700';
  sctx.font = 'bold 32px monospace';
  sctx.fillText('GOLD DIGGER', 300, 52);
  sctx.shadowBlur = 0;

  // Rank
  sctx.fillStyle = xpLevel >= 5 ? '#ff66ff' : xpLevel >= 3 ? '#66ccff' : '#ffcc44';
  sctx.font = 'bold 16px monospace';
  sctx.fillText(getRankTitle(xpLevel), 300, 76);

  // Divider
  const dg = sctx.createLinearGradient(80, 0, 520, 0);
  dg.addColorStop(0, 'rgba(255,215,0,0)');
  dg.addColorStop(0.3, 'rgba(255,215,0,0.5)');
  dg.addColorStop(0.5, 'rgba(255,230,100,0.8)');
  dg.addColorStop(0.7, 'rgba(255,215,0,0.5)');
  dg.addColorStop(1, 'rgba(255,215,0,0)');
  sctx.fillStyle = dg;
  sctx.fillRect(80, 88, 440, 2);

  // Distance
  sctx.fillStyle = 'rgba(255,255,255,0.4)';
  sctx.font = 'bold 11px monospace';
  sctx.fillText('DISTANCE MINED', 300, 112);
  sctx.shadowColor = '#66aaff';
  sctx.shadowBlur = 8;
  sctx.fillStyle = '#88ccff';
  sctx.font = 'bold 42px monospace';
  sctx.fillText(`${Math.floor(game.score).toLocaleString()}m`, 300, 158);
  sctx.shadowBlur = 0;

  // Biome
  sctx.fillStyle = 'rgba(255,255,255,0.3)';
  sctx.font = '10px monospace';
  sctx.fillText(`Reached: ${getBiomeName()}`, 300, 178);

  // Stats (3x2 grid)
  const gs = [
    { l: '💎 CRYSTALS', v: game.crystalsCollected.toString(), c: '#ffd700' },
    { l: '🔥 MAX COMBO', v: `${maxCombo}x`, c: '#ff66ff' },
    { l: '⛽ FUEL LEFT', v: `${Math.floor(fuel)}%`, c: '#44ddff' },
    { l: '💨 DODGES', v: nearMissCount.toString(), c: '#44ff44' },
    { l: '⭐ RANK', v: `Lv.${xpLevel}`, c: xpLevel >= 5 ? '#ff44ff' : '#ffd700' },
    { l: '📏 SCALE', v: `${player.scale.toFixed(2)}x`, c: '#ffaa44' },
  ];
  const gx = 80, gy = 205, cw = 180;
  for (let i = 0; i < gs.length; i++) {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const x = gx + col * cw;
    const y = gy + row * 55;
    sctx.textAlign = 'left';
    sctx.fillStyle = 'rgba(255,255,255,0.35)';
    sctx.font = '10px monospace';
    sctx.fillText(gs[i].l, x, y);
    sctx.fillStyle = gs[i].c;
    sctx.font = 'bold 18px monospace';
    sctx.fillText(gs[i].v, x, y + 20);
  }

  // High score badge
  if (game.score >= game.highScore && game.score > 0) {
    sctx.shadowColor = '#ffd700';
    sctx.shadowBlur = 10;
    sctx.fillStyle = '#ffd700';
    sctx.font = 'bold 14px monospace';
    sctx.textAlign = 'center';
    sctx.fillText('⭐ NEW HIGH SCORE! ⭐', 300, 340);
    sctx.shadowBlur = 0;
  }

  // Watermark
  sctx.fillStyle = 'rgba(255,255,255,0.2)';
  sctx.font = '10px monospace';
  sctx.textAlign = 'center';
  sctx.fillText('antara-paul04.github.io/stupid-game', 300, 375);

  return sc;
}

function shareCard() {
  const shareCanvas = generateShareImage();
  shareCanvas.toBlob(async (blob) => {
    const file = new File([blob], 'gold-digger-score.png', { type: 'image/png' });
    const shareData = {
      title: 'Gold Digger',
      text: `⛏ I mined ${Math.floor(game.score).toLocaleString()}m as a ${getRankTitle(xpLevel)}! 💎${game.crystalsCollected} crystals | 🔥${maxCombo}x combo\nCan you beat me?`,
      url: 'https://antara-paul04.github.io/stupid-game/',
    };

    // Try native share with image first
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ ...shareData, files: [file] });
        return;
      } catch (e) { /* user cancelled or failed */ }
    }

    // Fallback: try share without image
    if (navigator.share) {
      try {
        await navigator.share(shareData);
        return;
      } catch (e) { /* user cancelled */ }
    }

    // Final fallback: download the image
    const link = document.createElement('a');
    link.download = 'gold-digger-score.png';
    link.href = shareCanvas.toDataURL('image/png');
    link.click();
  }, 'image/png');
}

// ===== GAME LOOP =====
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
